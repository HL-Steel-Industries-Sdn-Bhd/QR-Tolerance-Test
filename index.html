                // 交织
                let inter = [];
                let maxD = Math.max(...dataBlocks.map(b => b.length));
                for (let i = 0; i < maxD; i++) for (let b of dataBlocks) if (i < b.length) inter.push(b[i]);
                let maxE = Math.max(...ecBlocks.map(b => b.length));
                for (let i = 0; i < maxE; i++) for (let b of ecBlocks) if (i < b.length) inter.push(b[i]);

                // 转位
                let allBits = [];
                for (let cw of inter) for (let j = 7; j >= 0; j--) allBits.push((cw >> j) & 1);

                // === 创建矩阵并绘制功能图形 ===
                let mtx = new Array(size);
                for (let i = 0; i < size; i++) mtx[i] = new Array(size).fill(null);

                function drawFinder(r0, c0) { for (let r = -1; r <= 7; r++) for (let c = -1; c <= 7; c++) { let
                            rr = r0 + r,
                            cc = c0 + c; if (rr >= 0 && rr < size && cc >= 0 && cc < size) { if (r >= 0 && r <=
                                6 && c >= 0 && c <= 6) mtx[rr][cc] = (r === 0 || r === 6 || c === 0 || c ===
                                6 || (r >= 2 && r <= 4 && c >= 2 && c <= 4)); else mtx[rr][cc] = false; } } }
                drawFinder(0, 0);
                drawFinder(0, size - 7);
                drawFinder(size - 7, 0);

                for (let i = 8; i < size - 8; i++) { mtx[6][i] = i % 2 === 0;
                    mtx[i][6] = i % 2 === 0; }

                function drawAlign(r0, c0) { for (let r = -2; r <= 2; r++) for (let c = -2; c <= 2; c++) { let
                            rr = r0 + r,
                            cc = c0 + c; if (rr >= 0 && rr < size && cc >= 0 && cc < size) mtx[rr][cc] = (r === -
                            2 || r === 2 || c === -2 || c === 2 || (r === 0 && c === 0)); } }
                let ac = getAlignmentCenters(version);
                for (let r of ac) for (let c of ac) if (!((r === 6 && c === 6) || (r === 6 && c === size - 7) || (
                        r === size - 7 && c === 6))) drawAlign(r, c);

                // 临时格式区占位为 false
                for (let i = 0; i <= 8; i++) { if (mtx[i][8] === null) mtx[i][8] = false; if (mtx[8][i] ===
                        null) mtx[8][i] = false; }
                for (let i = 0; i < 8; i++) { if (mtx[size - i - 1][8] === null) mtx[size - i - 1][8] = false;
                    if (mtx[8][size - i - 1] === null) mtx[8][size - i - 1] = false; }

                // === 放置数据位 ===
                let col = size - 1,
                    row = size - 1,
                    dir = -1,
                    bi = 0;

                function can(r, c) { return r >= 0 && r < size && c >= 0 && c < size && mtx[r][c] === null; }

                function nextPos() {
                    if (col === 6) col--;
                    if (dir === -1 && row < 0) { col -= 2; if (col === 6) col--;
                        row = 0;
                        dir = 1; } else if (dir === 1 && row >= size) { col -= 2; if (col === 6) col--;
                        row = size - 1;
                        dir = -1; }
                    return col >= 0;
                }

                while (col >= 0 && bi < allBits.length) {
                    for (let d = 0; d < 2; d++) { let c = col - d; if (can(row, c)) mtx[row][c] = allBits[bi++]; }
                    row += dir;
                    nextPos();
                }

                // === 掩码选择 ===
                function maskFn(mask, r, c) { switch (mask) { case 0: return (r + c) % 2 === 0; case 1: return r %
                            2 === 0; case 2: return c % 3 === 0; case 3: return (r + c) % 3 === 0; case 4: return (
                                Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0; case 5: return (r * c) % 2 + (
                            r * c) % 3 === 0; case 6: return ((r * c) % 2 + (r * c) % 3) % 2 === 0; case 7: return ((
                            r + c) % 2 + (r * c) % 3) % 2 === 0; } return false; }

                function scoreMatrix(mat) {
                    let s = 0,
                        sz = mat.length;
                    // 水平连续
                    for (let r = 0; r < sz; r++) { let cnt = 1; for (let c = 1; c < sz; c++) { if (mat[r][c] ===
                                mat[r][c - 1]) cnt++; else { if (cnt >= 5) s += cnt - 2;
                            cnt = 1; } } if (cnt >= 5) s += cnt - 2; }
                    // 垂直连续
                    for (let c = 0; c < sz; c++) { let cnt = 1; for (let r = 1; r < sz; r++) { if (mat[r][c] ===
                                mat[r - 1][c]) cnt++; else { if (cnt >= 5) s += cnt - 2;
                            cnt = 1; } } if (cnt >= 5) s += cnt - 2; }
                    // 2x2 块
                    for (let r = 0; r < sz - 1; r++) for (let c = 0; c < sz - 1; c++) if (mat[r][c] === mat[r + 1][
                            c
                        ] && mat[r][c] === mat[r][c + 1] && mat[r][c] === mat[r + 1][c + 1]) s += 3;
                    return s;
                }

                let bestMask = 0,
                    bestScore = Infinity,
                    bestMat = null;
                for (let mk = 0; mk < 8; mk++) {
                    let test = mtx.map(row => [...row]);
                    for (let r = 0; r < size; r++)
                        for (let c = 0; c < size; c++)
                            if (test[r][c] === null) test[r][c] = maskFn(mk, r, c);
                    let sc = scoreMatrix(test);
                    if (sc < bestScore) { bestScore = sc;
                        bestMask = mk;
                        bestMat = test; }
                }
                mtx = bestMat;

                // === 绘制格式信息 ===
                let fmtBits = FORMAT_INFO[EC_INDEX[ecLevel] * 8 + bestMask];
                let fmtPositions = [];
                // 左上角 + 右上角 + 左下角
                for (let i = 0; i <= 5; i++) fmtPositions.push([i, 8]);
                fmtPositions.push([7, 8]);
                fmtPositions.push([8, 8]);
                for (let i = 0; i <= 5; i++) fmtPositions.push([8, 7 - i]);
                fmtPositions.push([8, 1]);
                fmtPositions.push([8, 0]);
                // 右上角
                for (let i = 0; i <= 7; i++) fmtPositions.push([size - 8 + i, 8]);
                // 左下角
                for (let i = 0; i <= 7; i++) fmtPositions.push([8, size - 1 - i]);

                // 重新填充格式信息（覆盖之前的占位）
                for (let i = 0; i < 15; i++) {
                    let bit = (fmtBits >> (14 - i)) & 1;
                    let [r, c] = fmtPositions[i];
                    if (r >= 0 && r < size && c >= 0 && c < size) mtx[r][c] = bit === 1;
                }
                // 暗模块
                if (mtx[size - 8][8] === null || mtx[size - 8][8] === false) mtx[size - 8][8] = true;

                // 最终清理
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++)
                        if (mtx[r][c] === null) mtx[r][c] = false;

                return { modules: mtx, moduleCount: size, mask: bestMask };
            }

            // ========== 应用 ==========
            const textInput = document.getElementById('textInput');
            const versionSelect = document.getElementById('versionSelect');
            const errorLevelSelect = document.getElementById('errorLevel');
            const generateBtn = document.getElementById('generateBtn');
            const printBtn = document.getElementById('printBtn');
            const qrStage = document.getElementById('qrStage');
            const charBadge = document.getElementById('charBadge');
            const versionBadge = document.getElementById('versionBadge');
            const errorBadge = document.getElementById('errorBadge');
            const gridBadge = document.getElementById('gridBadge');
            const statusBadge = document.getElementById('statusBadge');
            let currentQRCanvas = null;

            function generate() {
                let text = textInput.value.trim();
                let version = parseInt(versionSelect.value);
                let ec = errorLevelSelect.value;
                let mc = MODULE_COUNT[version];
                charBadge.textContent = '字符: ' + text.length;
                versionBadge.textContent = '版本: ' + version;
                errorBadge.textContent = '纠错: ' + ec + '级';
                gridBadge.textContent = '网格: ' + mc + '×' + mc;
                statusBadge.textContent = '生成中...';
                statusBadge.className = 'badge';
                qrStage.innerHTML = '';
                currentQRCanvas = null;
                if (!text) { qrStage.innerHTML = '<div class="placeholder-text">输入内容后点击「生成二维码」</div>';
                    statusBadge.textContent = '就绪'; return; }
                try {
                    let result = generateQRCode(text, version, ec);
                    let modules = result.modules,
                        count = result.moduleCount;
                    let canvas = document.createElement('canvas');
                    let scale = Math.max(Math.floor(500 / count), 3);
                    canvas.width = count * scale;
                    canvas.height = count * scale;
                    canvas.style.maxWidth = '100%';
                    canvas.style.height = 'auto';
                    canvas.style.imageRendering = 'pixelated';
                    let ctx = canvas.getContext('2d');
                    ctx.imageSmoothingEnabled = false;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#000000';
                    for (let r = 0; r < count; r++)
                        for (let c = 0; c < count; c++)
                            if (modules[r][c]) ctx.fillRect(c * scale, r * scale, scale, scale);
                    qrStage.appendChild(canvas);
                    currentQRCanvas = canvas;
                    gridBadge.textContent = '网格: ' + count + '×' + count;
                    statusBadge.textContent = '✅ 可扫描 (mask ' + result.mask + ')';
                    statusBadge.className = 'badge success';
                } catch (e) {
                    console.error(e);
                    qrStage.innerHTML = '<div class="error-box">❌ <strong>容量不足</strong><br>版本' + version +
                        ' (' + mc + '×' + mc + ') + ' + ec + '级 无法容纳。<br>👉 请减少字符或升级版本。</div>';
                    statusBadge.textContent = '❌ 容量不足';
                    statusBadge.className = 'badge error';
                }
            }

            function printQR() { if (!currentQRCanvas) { alert('请先生成二维码'); return; } let u =
                    currentQRCanvas.toDataURL('image/png'); let w = window.open('', '_blank',
                    'width=900,height=900'); if (!w) { alert('弹窗被拦截'); return; } w.document.write(
                    '<!DOCTYPE html><html><head><title>打印</title><style>@page{size:A4;margin:12mm}*{margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:white}img{max-width:100%;max-height:95vh;image-rendering:pixelated}</style></head><body><img src="' +
                    u + '" onload="window.print()"></body></html>');
                w.document.close(); }
            generateBtn.addEventListener('click', generate);
            printBtn.addEventListener('click', printQR);
            versionSelect.addEventListener('change', generate);
            errorLevelSelect.addEventListener('change', generate);
            window.addEventListener('load', generate);
        })();
    </script>
</body>
