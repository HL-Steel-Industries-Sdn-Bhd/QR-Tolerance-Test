<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR码·容错实验室 | 骨架与数据区可视化</title>
  <!-- 引入 qrcodejs2 库，它将负责所有编码、画骨架、填数据、纠错的计算 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f5f7fa;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .lab-container {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
      padding: 30px;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      text-align: center;
      color: #5c6370;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .input-group {
      margin-bottom: 24px;
    }
    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #2c3e50;
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    textarea {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      border: 2px solid #e0e4e8;
      border-radius: 16px;
      resize: vertical;
      font-family: 'Courier New', monospace;
      transition: border 0.2s;
      background: #fafbfc;
    }
    textarea:focus {
      outline: none;
      border-color: #1e88e5;
      background: white;
    }
    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
      background: #f8fafc;
      padding: 20px;
      border-radius: 20px;
      align-items: flex-end;
    }
    .control-item {
      flex: 1 1 180px;
    }
    select, button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid #e0e4e8;
      font-size: 0.95rem;
      font-weight: 500;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    select:focus {
      outline: none;
      border-color: #1e88e5;
    }
    button {
      background: #1a1a2e;
      color: white;
      border: none;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button:hover {
      background: #2c3e50;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
    }
    button.print-btn {
      background: #1e88e5;
    }
    button.print-btn:hover {
      background: #1565c0;
    }
    .info-bar {
      background: #eef2f5;
      padding: 14px 20px;
      border-radius: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.95rem;
      color: #1e293b;
    }
    .badge {
      background: white;
      padding: 6px 16px;
      border-radius: 30px;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .qr-stage {
      background: white;
      border: 2px dashed #dce1e8;
      border-radius: 24px;
      padding: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 280px;
      margin-bottom: 20px;
    }
    #qrCanvas {
      display: block;
      max-width: 100%;
      height: auto;
      image-rendering: pixelated; /* 保持像素风格，看清每个格子 */
    }
    .legend {
      font-size: 0.8rem;
      color: #475569;
      text-align: center;
      margin-top: 8px;
    }
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .lab-container {
        box-shadow: none;
        border-radius: 0;
        padding: 20px;
      }
      .control-panel, .input-group, button, .info-bar, .legend {
        display: none; /* 打印时只显示二维码 */
      }
      .qr-stage {
        border: none;
        padding: 0;
      }
      #qrCanvas {
        width: 100%;
        height: auto;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
<div class="lab-container">
  <h1>🔬 QR 骨架与容错实验室</h1>
  <div class="subtitle">版本(尺寸) · 纠错等级 · 字符计数 · 实时预览</div>

  <div class="input-group">
    <label>📝 输入文字/数字/符号</label>
    <textarea id="textInput" placeholder="例如: https://hl-steel-industries-sdn-bhd.github.io/Cyril-ZYLfM3Bv859aDRcQ/">https://hl-steel-industries-sdn-bhd.github.io/Cyril-ZYLfM3Bv859aDRcQ/</textarea>
  </div>

  <div class="control-panel">
    <div class="control-item">
      <label>📐 版本 (网格尺寸)</label>
      <select id="versionSelect">
        <option value="1">版本1 (21x21)</option>
        <option value="2">版本2 (25x25)</option>
        <option value="3">版本3 (29x29)</option>
        <option value="4" selected>版本4 (33x33)</option>
        <option value="5">版本5 (37x37)</option>
        <option value="10">版本10 (57x57)</option>
        <option value="40">版本40 (177x177)</option>
      </select>
    </div>
    <div class="control-item">
      <label>🛡️ 纠错等级</label>
      <select id="errorLevel">
        <option value="L">L (≈7% 恢复)</option>
        <option value="M">M (≈15% 恢复)</option>
        <option value="Q">Q (≈25% 恢复)</option>
        <option value="H" selected>H (≈30% 恢复)</option>
      </select>
    </div>
    <div class="control-item" style="flex: 0 0 auto;">
      <button id="generateBtn">✨ 生成二维码</button>
    </div>
    <div class="control-item" style="flex: 0 0 auto;">
      <button id="printBtn" class="print-btn">🖨️ 打印 QR (A4)</button>
    </div>
  </div>

  <div class="info-bar" id="infoBar">
    <span class="badge" id="charCount">字符数: 0</span>
    <span class="badge" id="versionInfo">版本: -</span>
    <span class="badge" id="errorInfo">纠错: -</span>
    <span class="badge" id="gridSize">网格: -</span>
  </div>

  <div class="qr-stage" id="qrStage">
    <canvas id="qrCanvas"></canvas>
  </div>
  <div class="legend">
    💡 三个角落的“回”字是定位骨架(不存数据) | 黑白模块即为数据与纠错码的交织物理呈现
  </div>
</div>

<script>
  (function() {
    // ----- 获取DOM元素 -----
    const textInput = document.getElementById('textInput');
    const versionSelect = document.getElementById('versionSelect');
    const errorLevelSelect = document.getElementById('errorLevel');
    const generateBtn = document.getElementById('generateBtn');
    const printBtn = document.getElementById('printBtn');
    const qrStage = document.getElementById('qrStage');
    const qrCanvas = document.getElementById('qrCanvas');
    const charCountSpan = document.getElementById('charCount');
    const versionInfoSpan = document.getElementById('versionInfo');
    const errorInfoSpan = document.getElementById('errorInfo');
    const gridSizeSpan = document.getElementById('gridSize');

    // 当前使用的二维码实例
    let currentQRCode = null;

    // ----- 版本对应的模块数 (Version -> Modules) -----
    const versionModules = {
      1: 21, 2: 25, 3: 29, 4: 33, 5: 37,
      10: 57, 40: 177
    };

    // ----- 核心函数：生成二维码到Canvas上 -----
    function generateQR() {
      const text = textInput.value.trim();
      const version = parseInt(versionSelect.value, 10);
      const errorLevel = errorLevelSelect.value; // 'L', 'M', 'Q', 'H'

      // 更新信息栏基本字符数
      const charLen = text.length;
      charCountSpan.textContent = `字符数: ${charLen}`;
      versionInfoSpan.textContent = `版本: ${version}`;
      errorInfoSpan.textContent = `纠错: ${errorLevel}级`;
      gridSizeSpan.textContent = `网格: ${versionModules[version]}x${versionModules[version]}`;

      // 清除之前的二维码
      qrStage.innerHTML = '<canvas id="qrCanvas"></canvas>';
      const newCanvas = document.getElementById('qrCanvas');

      if (!text) {
        // 没有内容时显示提示
        const ctx = newCanvas.getContext('2d');
        newCanvas.width = 200;
        newCanvas.height = 200;
        ctx.fillStyle = '#f0f2f5';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '16px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('输入内容后生成', 100, 106);
        currentQRCode = null;
        return;
      }

      try {
        // 使用 qrcodejs2 生成二维码
        currentQRCode = new QRCode(newCanvas, {
          text: text,
          width: 300,           // 显示宽度，实际模块由版本决定
          height: 300,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel[errorLevel], // 动态纠错等级
          version: version      // 指定版本(若内容超出容量会报错)
        });

        // 生成成功后，微调canvas样式保留像素感
        setTimeout(() => {
          newCanvas.style.width = 'min(300px, 80vw)';
          newCanvas.style.height = 'auto';
        }, 20);

      } catch (e) {
        // 如果内容超出所选版本的容量，提示用户
        alert(`❌ 生成失败：内容过长，无法放入版本${version} (${versionModules[version]}x${versionModules[version]}) 且纠错等级 ${errorLevel} 的码中。\n请减少字符或升级版本。`);
        console.error(e);
        // 恢复界面
        qrStage.innerHTML = '<canvas id="qrCanvas"></canvas>';
        const failCanvas = document.getElementById('qrCanvas');
        const ctx = failCanvas.getContext('2d');
        failCanvas.width = 200;
        failCanvas.height = 200;
        ctx.fillStyle = '#fee2e2';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#b91c1c';
        ctx.font = '14px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('容量不足', 100, 90);
        ctx.fillText('请减少字符或升级版本', 100, 116);
        currentQRCode = null;
      }
    }

    // ----- 打印功能：将当前二维码以A4尺寸输出 -----
    function printQR() {
      if (!currentQRCode) {
        alert('请先生成二维码再打印。');
        return;
      }
      // 获取canvas数据
      const canvas = document.querySelector('#qrStage canvas');
      if (!canvas) return;

      const dataUrl = canvas.toDataURL('image/png');

      // 构建打印窗口
      const printWindow = window.open('', '_blank', 'width=800,height=800');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>打印 QR 码 - A4</title>
          <style>
            @page {
              size: A4;
              margin: 15mm;
            }
            body {
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              margin: 0;
              background: white;
            }
            img {
              max-width: 100%;
              max-height: 100%;
              image-rendering: pixelated;
              border: 1px solid #eee;
            }
          </style>
        </head>
        <body>
          <img src="${dataUrl}" alt="QR Code">
        </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.focus();
      // 自动弹出打印对话框
      printWindow.print();
      // 打印后关闭窗口
      printWindow.onafterprint = function() {
        printWindow.close();
      };
    }

    // ----- 绑定事件 -----
    generateBtn.addEventListener('click', generateQR);
    printBtn.addEventListener('click', printQR);

    // 可选：修改版本或纠错时自动重新生成(如果不想自动，可注释掉)
    versionSelect.addEventListener('change', generateQR);
    errorLevelSelect.addEventListener('change', generateQR);

    // 页面加载完成自动生成一次（使用默认内容）
    window.addEventListener('load', () => {
      generateQR();
    });

    // 额外说明：版本5确实是存在的，二维码标准版本从1到40全部连续。
    // 版本5 = 37x37 模块。
  })();
</script>
</body>
</html>
