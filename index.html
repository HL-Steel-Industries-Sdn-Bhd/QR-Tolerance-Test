<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR码·容错实验室</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --sub: #64748b;
            --accent: #3b82f6;
            --border: #e2e8f0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 860px;
            width: 100%;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            padding: 32px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: var(--sub);
            margin-bottom: 28px;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #334155;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        textarea {
            width: 100%;
            padding: 14px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            background: #fafbfc;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            align-items: flex-end;
        }
        .control-item {
            flex: 1 1 150px;
            min-width: 130px;
        }
        .control-item label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #475569;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        select,
        button {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid var(--border);
            font-size: 0.9rem;
            font-weight: 500;
            background: white;
            cursor: pointer;
            font-family: inherit;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            background: #1e293b;
            color: white;
            border: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        button:hover {
            background: #334155;
        }
        button.print-btn {
            background: #2563eb;
        }
        .info-bar {
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        .badge {
            background: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge.success {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge.error {
            background: #fef2f2;
            color: #dc2626;
        }
        .qr-stage {
            background: white;
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 240px;
            margin-bottom: 12px;
        }
        .qr-stage canvas {
            display: block;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
        }
        .placeholder-text {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
        }
        .error-box {
            color: #dc2626;
            background: #fef2f2;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .legend {
            font-size: 0.8rem;
            color: var(--sub);
            text-align: center;
        }
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
                padding: 0;
                max-width: 100%;
            }
            .controls,
            .input-group,
            .info-bar,
            .legend,
            h1,
            .subtitle,
            button {
                display: none !important;
            }
            .qr-stage {
                border: none;
                padding: 0;
            }
            .qr-stage canvas {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 QR 容错实验室</h1>
        <p class="subtitle">版本 · 纠错等级 · 字符计数 · 打印 A4 · 验证可扫</p>
        <div class="input-group">
            <label>输入文字 / 数字 / 符号</label>
            <textarea id="textInput" rows="3">https://hl-steel-industries-sdn-bhd.github.io/Cyril-ZYLfM3Bv859aDRcQ/</textarea>
        </div>
        <div class="controls">
            <div class="control-item">
                <label>版本</label>
                <select id="versionSelect">
                    <option value="1">版本1 (21×21)</option>
                    <option value="2">版本2 (25×25)</option>
                    <option value="3">版本3 (29×29)</option>
                    <option value="4" selected>版本4 (33×33)</option>
                    <option value="5">版本5 (37×37)</option>
                    <option value="10">版本10 (57×57)</option>
                    <option value="40">版本40 (177×177)</option>
                </select>
            </div>
            <div class="control-item">
                <label>纠错等级</label>
                <select id="errorLevel">
                    <option value="L">L (≈7%)</option>
                    <option value="M">M (≈15%)</option>
                    <option value="Q">Q (≈25%)</option>
                    <option value="H" selected>H (≈30%)</option>
                </select>
            </div>
            <div class="control-item" style="flex:0 0 auto;"><button id="generateBtn">✨ 生成</button></div>
            <div class="control-item" style="flex:0 0 auto;"><button id="printBtn" class="print-btn">🖨️ 打印</button></div>
        </div>
        <div class="info-bar">
            <span class="badge" id="charBadge">字符: 0</span>
            <span class="badge" id="versionBadge">版本: -</span>
            <span class="badge" id="errorBadge">纠错: -</span>
            <span class="badge" id="gridBadge">网格: -</span>
            <span class="badge" id="statusBadge">就绪</span>
        </div>
        <div class="qr-stage" id="qrStage"><div class="placeholder-text">点击「生成」</div></div>
        <p class="legend">基于 qrcode-generator (Nayuki) · 安静区内嵌 · 可被所有扫描器识别</p>
    </div>

    <script>
        // ========== 应用逻辑 ==========
        // 注意：内嵌的是 qrcode-generator 库，API 略有不同
        // 它暴露的全局变量是 qrcodegenerator

        const textInput = document.getElementById('textInput');
        const versionSelect = document.getElementById('versionSelect');
        const errorLevelSelect = document.getElementById('errorLevel');
        const generateBtn = document.getElementById('generateBtn');
        const printBtn = document.getElementById('printBtn');
        const qrStage = document.getElementById('qrStage');
        const charBadge = document.getElementById('charBadge');
        const versionBadge = document.getElementById('versionBadge');
        const errorBadge = document.getElementById('errorBadge');
        const gridBadge = document.getElementById('gridBadge');
        const statusBadge = document.getElementById('statusBadge');

        const versionModules = { 1: 21, 2: 25, 3: 29, 4: 33, 5: 37, 10: 57, 40: 177 };
        let currentQRCanvas = null;

        function generate() {
            const text = textInput.value.trim();
            const version = parseInt(versionSelect.value);
            const ec = errorLevelSelect.value;
            const mc = versionModules[version];

            charBadge.textContent = '字符: ' + text.length;
            versionBadge.textContent = '版本: ' + version;
            errorBadge.textContent = '纠错: ' + ec + '级';
            gridBadge.textContent = '网格: ' + mc + '×' + mc;
            statusBadge.textContent = '生成中...';
            statusBadge.className = 'badge';
            qrStage.innerHTML = '';
            currentQRCanvas = null;

            if (!text) {
                qrStage.innerHTML = '<div class="placeholder-text">点击「生成」</div>';
                statusBadge.textContent = '就绪';
                return;
            }

            try {
                // 等待库就绪
                if (typeof qrcodegenerator === 'undefined') {
                    throw new Error('库未加载，请刷新页面');
                }

                const ecMap = {
                    'L': qrcodegenerator.ErrorCorrectionLevel.L,
                    'M': qrcodegenerator.ErrorCorrectionLevel.M,
                    'Q': qrcodegenerator.ErrorCorrectionLevel.Q,
                    'H': qrcodegenerator.ErrorCorrectionLevel.H
                };

                const qr = qrcodegenerator.create(version, ecMap[ec]);
                qr.addData(text, qrcodegenerator.Mode.BYTE);
                qr.make();

                const count = qr.getModuleCount();
                const modules = qr.getModules();

                // 渲染到 canvas
                const quiet = 4;
                const scale = Math.max(Math.floor(500 / (count + quiet * 2)), 3);
                const canvas = document.createElement('canvas');
                canvas.width = (count + quiet * 2) * scale;
                canvas.height = (count + quiet * 2) * scale;
                canvas.style.maxWidth = '100%';
                canvas.style.height = 'auto';
                canvas.style.imageRendering = 'pixelated';

                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#000000';
                for (let r = 0; r < count; r++) {
                    for (let c = 0; c < count; c++) {
                        if (modules[r][c]) {
                            ctx.fillRect((quiet + c) * scale, (quiet + r) * scale, scale, scale);
                        }
                    }
                }

                qrStage.appendChild(canvas);
                currentQRCanvas = canvas;
                gridBadge.textContent = '网格: ' + count + '×' + count + ' + 安静区';
                statusBadge.textContent = '✅ 可扫描';
                statusBadge.className = 'badge success';

            } catch (e) {
                console.error(e);
                qrStage.innerHTML = '<div class="error-box">❌ <strong>' + e.message + '</strong><br>版本' +
                    version + ' (' + mc + '×' + mc + ') + ' + ec + '级 无法容纳。</div>';
                statusBadge.textContent = '❌ 失败';
                statusBadge.className = 'badge error';
            }
        }

        function printQR() {
            if (!currentQRCanvas) { alert('请先生成二维码'); return; }
            const u = currentQRCanvas.toDataURL('image/png');
            const w = window.open('', '_blank', 'width=900,height=900');
            if (!w) { alert('弹窗被拦截'); return; }
            w.document.write(
                '<!DOCTYPE html><html><head><title>打印</title><style>@page{size:A4;margin:12mm}*{margin:0;padding:0}body{display:flex;justify-content:center;align-items:center;min-height:100vh}img{max-width:100%;max-height:95vh;image-rendering:pixelated}</style></head><body><img src="' +
                u + '" onload="window.print()"></body></html>');
            w.document.close();
        }

        generateBtn.addEventListener('click', generate);
        printBtn.addEventListener('click', printQR);
        versionSelect.addEventListener('change', generate);
        errorLevelSelect.addEventListener('change', generate);
        window.addEventListener('load', function() {
            // 等待库加载完成
            let attempts = 0;
            const checkLib = setInterval(function() {
                attempts++;
                if (typeof qrcodegenerator !== 'undefined') {
                    clearInterval(checkLib);
                    statusBadge.textContent = '就绪';
                    generate();
                } else if (attempts > 100) {
                    clearInterval(checkLib);
                    statusBadge.textContent = '❌ 库加载失败';
                    statusBadge.className = 'badge error';
                    qrStage.innerHTML =
                        '<div class="error-box">❌ QR库加载失败。<br>请检查网络后刷新页面。</div>';
                }
            }, 50);
        });
    </script>
</body>
</html>
